{{- if .Values.rclone.enabled -}}
{{- if .Values.rclone.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pv-migrate.rclone.serviceAccountName" . }}
  namespace: {{ .Values.rclone.namespace }}
  labels:
    app.kubernetes.io/component: rclone
    {{- include "pv-migrate.labels" . | nindent 4 }}
  {{- with .Values.rclone.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
