{{- if .Values.rclone.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pv-migrate.fullname" . }}-rclone
  namespace: {{ .Values.rclone.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: rclone
      {{- include "pv-migrate.selectorLabels" . | nindent 6 }}
  ingress:
    - {}
  egress:
    - {}
  policyTypes:
    - Ingress
    - Egress
{{- end }}
