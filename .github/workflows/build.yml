name: build

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - renovate/**
    paths-ignore:
      - "**.md"
      - "img/**"
      - "test/**"
      - ".gitignore"
      - "renovate.json"
      - ".krew.yaml"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "img/**"
      - "test/**"
      - ".gitignore"
      - "renovate.json"
      - ".krew.yaml"

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash --noprofile --norc -euox pipefail {0}

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Install go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - name: Install Task
        uses: arduino/setup-task@v2.0.0
        with:
          # renovate: depName=go-task/task datasource=github-releases
          version: 3.49.1
      - name: Tidy go.mod
        run: go mod tidy
      - name: Run linters
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          # renovate: depName=golangci/golangci-lint datasource=github-releases
          version: v2.11.4
          args: --timeout=10m0s
          install-mode: goinstall
      - name: Build with Goreleaser
        if: ${{ always() }}
        uses: goreleaser/goreleaser-action@v7.0.0
        with:
          # renovate: depName=goreleaser/goreleaser datasource=github-releases
          version: v2.15.2
          args: build --snapshot --clean --single-target
      - name: Update usage
        run: task update-usage
      - name: Update helm chart docs
        run: task update-helm-chart-docs
      - name: Check for dirty files
        run: git diff --exit-code

  test-migrate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Get short SHA
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build images
        run: |
          TAG="${{ steps.vars.outputs.sha }}"
          docker build -t integration-test-rsync:$TAG ./docker/rsync/
          docker build -t integration-test-sshd:$TAG ./docker/sshd/

      - name: Install go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - name: Install helm
        run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      - name: Install cilium-cli
        env:
          # renovate: depName=cilium/cilium-cli datasource=github-releases
          CILIUM_CLI_VERSION: v0.19.2
        run: |
          wget https://github.com/cilium/cilium-cli/releases/download/${CILIUM_CLI_VERSION}/cilium-linux-amd64.tar.gz
          sudo tar xzvfC cilium-linux-amd64.tar.gz /usr/local/bin
          rm cilium-linux-amd64.tar.gz

      - name: kind-1 - Setup
        uses: ./.github/actions/setup-cluster
        with:
          cluster_name: kind-1
          kubeconfig: /home/runner/.kube/config
          image_tag: ${{ steps.vars.outputs.sha }}
          metallb_ip_range_start: 240
          metallb_ip_range_end: 255

      - name: kind-2 - Setup
        uses: ./.github/actions/setup-cluster
        with:
          cluster_name: kind-2
          kubeconfig: /home/runner/.kube/kind-2.yaml
          image_tag: ${{ steps.vars.outputs.sha }}
          metallb_ip_range_start: 220
          metallb_ip_range_end: 235

      - name: Run migration tests
        env:
          PVMIG_TEST_EXTRA_KUBECONFIG: /home/runner/.kube/kind-2.yaml
          RSYNC_IMAGE: integration-test-rsync:${{ steps.vars.outputs.sha }}
          SSHD_IMAGE: integration-test-sshd:${{ steps.vars.outputs.sha }}
        run: go test -tags integration -race -coverpkg=./... -coverprofile=coverage.txt -covermode=atomic -timeout 20m -v ./... -run TestMigrate
      - name: Gather cluster diagnostics
        if: failure()
        run: |
          DIAG_DIR=/tmp/cluster-diagnostics
          mkdir -p "${DIAG_DIR}/kind-1/logs" "${DIAG_DIR}/kind-2/logs"

          gather() {
            local kubeconfig="$1"
            local dir="$2"
            export KUBECONFIG="${kubeconfig}"

            kubectl cluster-info dump >"${dir}/cluster-info-dump.txt" 2>&1 || true
            kubectl get nodes -o wide >"${dir}/nodes.txt" 2>&1 || true
            kubectl get all --all-namespaces -o wide >"${dir}/all-resources.txt" 2>&1 || true
            kubectl get events --all-namespaces --sort-by='.lastTimestamp' >"${dir}/events.txt" 2>&1 || true
            kubectl describe nodes >"${dir}/node-describe.txt" 2>&1 || true
            kubectl describe pods --all-namespaces >"${dir}/pod-describe.txt" 2>&1 || true
            kubectl get jobs --all-namespaces -o wide >"${dir}/jobs.txt" 2>&1 || true
            kubectl describe jobs --all-namespaces >"${dir}/job-describe.txt" 2>&1 || true
            kubectl top nodes >"${dir}/top-nodes.txt" 2>&1 || true
            kubectl top pods --all-namespaces >"${dir}/top-pods.txt" 2>&1 || true
            helm list --all-namespaces >"${dir}/helm-releases.txt" 2>&1 || true

            kubectl get pods --all-namespaces -o jsonpath='{range .items[*]}{.metadata.namespace}/{.metadata.name}{"\n"}{end}' 2>/dev/null \
              | while IFS='/' read -r ns pod; do
                [ -z "${ns}" ] && continue
                kubectl logs -n "${ns}" "${pod}" --all-containers --timestamps >"${dir}/logs/${ns}_${pod}.log" 2>&1 || true
                kubectl logs -n "${ns}" "${pod}" --all-containers --timestamps --previous >"${dir}/logs/${ns}_${pod}-previous.log" 2>/dev/null || true
              done || true
          }

          gather /home/runner/.kube/config "${DIAG_DIR}/kind-1"
          gather /home/runner/.kube/kind-2.yaml "${DIAG_DIR}/kind-2"

      - name: Upload cluster diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: migrate-cluster-diagnostics
          path: /tmp/cluster-diagnostics
          retention-days: 7

      - name: Send coverage
        uses: codecov/codecov-action@v6.0.0
        with:
          files: coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}

  test-backup:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Get short SHA
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build rclone image
        run: docker build -t integration-test-rclone:${{ steps.vars.outputs.sha }} ./docker/rclone/

      - name: Install go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Install helm
        run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: backup-test
          # renovate: depName=kubernetes-sigs/kind datasource=github-releases
          version: v0.31.0

      - name: Load rclone image
        run: kind load docker-image integration-test-rclone:${{ steps.vars.outputs.sha }} --name backup-test

      - name: Deploy MinIO
        env:
          # renovate: depName=quay.io/minio/minio datasource=docker
          MINIO_VERSION: RELEASE.2025-09-07T16-13-09Z
          # renovate: depName=quay.io/minio/mc datasource=docker
          MC_VERSION: RELEASE.2025-08-13T08-35-41Z
        run: |
          kubectl create namespace pv-migrate-test --dry-run=client -oyaml | kubectl apply -f -
          kubectl -n pv-migrate-test run minio \
            --image=quay.io/minio/minio:${MINIO_VERSION} \
            --port=9000 \
            --command -- minio server /data
          kubectl -n pv-migrate-test expose pod minio --port=9000
          kubectl -n pv-migrate-test wait --for=condition=Ready pod/minio --timeout=60s
          kubectl -n pv-migrate-test run mc --rm -i --restart=Never \
            --image=quay.io/minio/mc:${MC_VERSION} \
            --command -- sh -c "mc alias set test http://minio:9000 minioadmin minioadmin && mc mb test/pv-migrate-test"

      - name: Run backup and cloud tests
        env:
          RCLONE_IMAGE: integration-test-rclone:${{ steps.vars.outputs.sha }}
          # Fail (not skip) cloud tests when secrets are available; allow skip on fork PRs without secrets
          CLOUD_TESTS_MUST_RUN: ${{ secrets.CLOUD_TEST_S3_ACCESS_KEY != '' && 'true' || '' }}
          CLOUD_TEST_S3_ACCESS_KEY: ${{ secrets.CLOUD_TEST_S3_ACCESS_KEY }}
          CLOUD_TEST_S3_SECRET_KEY: ${{ secrets.CLOUD_TEST_S3_SECRET_KEY }}
          CLOUD_TEST_GCS_SERVICE_ACCOUNT_JSON: ${{ secrets.CLOUD_TEST_GCS_SERVICE_ACCOUNT_JSON }}
          CLOUD_TEST_AZURE_STORAGE_KEY: ${{ secrets.CLOUD_TEST_AZURE_STORAGE_KEY }}
        run: go test -tags integration,integration_cloud -count=1 -timeout 15m -v ./integration/ -run 'TestBackup|TestCloud'

      - name: Gather cluster diagnostics
        if: failure()
        run: |
          DIAG_DIR=/tmp/cluster-diagnostics
          mkdir -p "${DIAG_DIR}/logs"

          kubectl cluster-info dump >"${DIAG_DIR}/cluster-info-dump.txt" 2>&1 || true
          kubectl get nodes -o wide >"${DIAG_DIR}/nodes.txt" 2>&1 || true
          kubectl get all --all-namespaces -o wide >"${DIAG_DIR}/all-resources.txt" 2>&1 || true
          kubectl get events --all-namespaces --sort-by='.lastTimestamp' >"${DIAG_DIR}/events.txt" 2>&1 || true
          kubectl describe nodes >"${DIAG_DIR}/node-describe.txt" 2>&1 || true
          kubectl describe pods --all-namespaces >"${DIAG_DIR}/pod-describe.txt" 2>&1 || true
          kubectl get jobs --all-namespaces -o wide >"${DIAG_DIR}/jobs.txt" 2>&1 || true
          kubectl describe jobs --all-namespaces >"${DIAG_DIR}/job-describe.txt" 2>&1 || true
          helm list --all-namespaces >"${DIAG_DIR}/helm-releases.txt" 2>&1 || true

          kubectl get pods --all-namespaces -o jsonpath='{range .items[*]}{.metadata.namespace}/{.metadata.name}{"\n"}{end}' 2>/dev/null \
            | while IFS='/' read -r ns pod; do
              [ -z "${ns}" ] && continue
              kubectl logs -n "${ns}" "${pod}" --all-containers --timestamps >"${DIAG_DIR}/logs/${ns}_${pod}.log" 2>&1 || true
              kubectl logs -n "${ns}" "${pod}" --all-containers --timestamps --previous >"${DIAG_DIR}/logs/${ns}_${pod}-previous.log" 2>/dev/null || true
            done || true

      - name: Upload cluster diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backup-cluster-diagnostics
          path: /tmp/cluster-diagnostics
          retention-days: 7
