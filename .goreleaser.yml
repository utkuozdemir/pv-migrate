---
version: 2
before:
  hooks:
    - go mod download
    - ./scripts/completions.sh

builds:
  - id: pv-migrate
    main: ./cmd/pv-migrate
    binary: pv-migrate
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm
      - arm64
    goarm:
     - "7"
    ignore:
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: arm64
      - goos: darwin
        goarch: arm

archives:
  - id: pv-migrate-archive
    # default name template except we use .Tag instead of .Version to keep the "v" prefix
    name_template: >-
      {{ .ProjectName }}_
      {{- .Tag }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- with .Arm }}v{{ . }}{{ end }}
      {{- with .Mips }}_{{ . }}{{ end }}
      {{- if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}
    ids:
      - pv-migrate
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - completions/*

checksum:
  name_template: checksums.txt
  algorithm: sha256

git:
  ignore_tags: # skip prereleases (alpha, beta, rc) on finding previous commit to generate the changelog
    - "*-*"

changelog:
  sort: asc
  groups:
    - title: "New Features"
      regexp: '^feat(\(.+\))?:'
      order: 0
    - title: "Bug Fixes"
      regexp: '^fix(\(.+\))?:'
      order: 1
    - title: "Performance Improvements"
      regexp: '^perf(\(.+\))?:'
      order: 2
    - title: "Documentation"
      regexp: '^docs(\(.+\))?:'
      order: 3
    - title: "Refactors & Internal Changes"
      regexp: '^refactor(\(.+\))?:'
      order: 4
    - title: "Dependency Updates"
      regexp: '^chore\(deps\):'
      order: 5
    - title: "Build, CI & Chores"
      regexp: '^(build|ci|cd|cicd|docker|test|chore)(\(.+\))?:'
      order: 6
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - Merge pull request
      - Merge branch
      - go mod tidy

dockers_v2:
  - images:
      - docker.io/utkuozdemir/pv-migrate
      - ghcr.io/utkuozdemir/pv-migrate
    tags:
      - "{{ .Tag }}"
      - "{{ if not .Prerelease }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7

release:
  prerelease: auto

# brews is deprecated in favor of homebrew_casks, but casks are unsuitable for CLI tools:
# they don't upgrade with `brew upgrade` by default, and require macOS code signing.
# See: https://github.com/orgs/goreleaser/discussions/5563
brews:
  - repository:
      owner: utkuozdemir
      name: homebrew-pv-migrate
      token: "{{ .Env.PRIVATE_ACCESS_TOKEN }}"
    skip_upload: auto
    commit_author:
      name: Utku Ozdemir
      email: utkuozdemir@gmail.com
    directory: Formula
    goarm: "7"
    homepage: https://github.com/utkuozdemir/pv-migrate
    description: Persistent volume migration plugin for Kubernetes
    license: Apache-2.0
    test: |
      system "#{bin}/pv-migrate -v"
    install: |-
      bin.install "pv-migrate"
      bash_completion.install "completions/pv-migrate.bash" => "pv-migrate"
      zsh_completion.install "completions/pv-migrate.zsh" => "_pv-migrate"
      fish_completion.install "completions/pv-migrate.fish"

scoops:
  - repository:
      owner: utkuozdemir
      name: scoop-pv-migrate
      token: "{{ .Env.PRIVATE_ACCESS_TOKEN }}"
    skip_upload: auto
    commit_author:
      name: Utku Ozdemir
      email: utkuozdemir@gmail.com
    commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: https://github.com/utkuozdemir/pv-migrate
    description: Persistent volume migration plugin for Kubernetes
    license: Apache-2.0
